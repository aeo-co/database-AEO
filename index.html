<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Marketer — AI visibility</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0A0A0C;
    --surface: #131417;
    --surface-2: #191B20;
    --border: #212328;
    --text: #EDEDF0;
    --text-muted: #86868C;
    --accent: #F0A83C;
    --success: #3ECF8E;
    --danger: #F0708A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    padding: 44px 24px 90px;
  }
  .wrap { max-width: 1020px; margin: 0 auto; }
  header { display: flex; justify-content: space-between; align-items: flex-end; gap: 24px; margin-bottom: 36px; flex-wrap: wrap; }
  h1 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 30px; margin: 0 0 6px; letter-spacing: -0.01em; }
  .sub { color: var(--text-muted); font-size: 14px; margin: 0; }
  select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 11px 16px;
    border-radius: 10px;
    min-width: 200px;
  }
  .header-controls { display: flex; gap: 10px; align-items: center; }


  /* Bento row 1 - hero + secondary platform cards, equal width */
  .bento-row1 { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 16px; margin-bottom: 16px; }
  .bento-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    min-height: 250px;
  }
  .ring-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; }
  .ring-label {
    position: absolute;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
  }
  .eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text-muted); margin: 0 0 2px; }
  .hero-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 23px; margin: 22px 0 8px; }
  .hero-caption { color: var(--text-muted); font-size: 13px; line-height: 1.6; max-width: 230px; }
  .cell-title { font-family: 'Space Grotesk', sans-serif; font-weight: 500; font-size: 16px; margin: 16px 0 6px; }
  .cell-caption { color: var(--text-muted); font-size: 13px; line-height: 1.6; }

  /* Bento row 2 - chart card + mentions card */
  .bento-row2 { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; margin-bottom: 28px; }
  @media (max-width: 700px) { .bento-row2 { grid-template-columns: 1fr; } }
  .panel-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    display: flex;
    flex-direction: column;
  }
  .cell-heading { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 500; color: var(--text-muted); margin: 0 0 20px; }
  .chart-box { height: 220px; }
  .mentions-wrap { display: flex; flex-wrap: wrap; align-content: flex-start; gap: 8px; }
  .mention-chip { display: inline-flex; align-items: center; gap: 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px; padding: 6px 14px 6px 6px; }
  .chip-avatar { width: 24px; height: 24px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; flex-shrink: 0; }
  .chip-name { font-size: 13px; }
  .chip-count { font-size: 11px; color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; }
  .mentions-empty { color: var(--text-muted); font-size: 13px; margin: auto 0; }

  /* Query table */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 24px;
  }
  .panel h2 { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 500; margin: 0 0 18px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--text-muted); font-weight: 500; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
  td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr.row:hover { background: var(--surface-2); cursor: pointer; }
  .pill { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .query-cell { max-width: 360px; color: var(--text); }
  .detail { display: none; background: var(--surface-2); }
  .detail.open { display: table-row; }
  .detail td { color: var(--text-muted); font-size: 13px; line-height: 1.65; padding: 18px; }
  .detail h4 { color: var(--text); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; margin: 0 0 6px; }
  .detail section { margin-bottom: 16px; }
  .detail section:last-child { margin-bottom: 0; }
  .mention-pill { background: var(--surface); border: 1px solid var(--border); margin: 2px 4px 2px 0; color: var(--text-muted); }
  .empty { color: var(--text-muted); text-align: center; padding: 70px 0; font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>AI visibility</h1>
    </div>
    <div class="header-controls">
      <select id="client-select"><option>Loading clients…</option></select>
    </div>
  </header>
  <div id="content"><div class="empty">Loading…</div></div>
</div>

<script>
const PLATFORM_COLORS = {
  google_ai_mode: '#4C8DFF',
  chatgpt: '#3ECF8E',
  perplexity: '#A78BFA',
};
const PLATFORM_LABELS = {
  google_ai_mode: 'Google AI Mode',
  chatgpt: 'ChatGPT',
  perplexity: 'Perplexity',
};
const AVATAR_PALETTE = ['#4C8DFF', '#3ECF8E', '#A78BFA', '#F0A83C', '#F0708A', '#5EC8D8'];

function platformColor(p) { return PLATFORM_COLORS[p] || '#6B7280'; }
function platformLabel(p) {
  return PLATFORM_LABELS[p] || p.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}
function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s ?? '';
  return div.innerHTML;
}
function hashColor(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) >>> 0;
  return AVATAR_PALETTE[h % AVATAR_PALETTE.length];
}
function initials(name) {
  const words = name.trim().split(/\s+/);
  return words.length === 1 ? words[0].slice(0, 2).toUpperCase() : (words[0][0] + words[1][0]).toUpperCase();
}

let chart;

async function loadClients() {
  const res = await fetch('/api/clients');
  const clients = await res.json();
  const select = document.getElementById('client-select');
  if (!clients.length) {
    select.innerHTML = '<option>No clients yet</option>';
    document.getElementById('content').innerHTML = '<div class="empty">No clients loaded yet - run ingest_ai_visibility.py first.</div>';
    return;
  }
  select.innerHTML = clients.map(c => `<option value="${c.slug}">${c.name}</option>`).join('');
  select.addEventListener('change', () => loadClient(select.value));
  loadClient(select.value);
}

function ring(score, color, size, strokeWidth) {
  const r = (size - strokeWidth) / 2 - 2;
  const c = 2 * Math.PI * r;
  const pct = Math.max(0, Math.min(100, score ?? 0));
  const offset = c - (pct / 100) * c;
  const mid = size / 2;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${mid}" cy="${mid}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${strokeWidth}"/>
    <circle cx="${mid}" cy="${mid}" r="${r}" fill="none" stroke="${color}" stroke-width="${strokeWidth}"
      stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"
      transform="rotate(-90 ${mid} ${mid})"/>
  </svg>`;
}

function heroCell(s) {
  const color = platformColor(s.platform);
  return `
    <div class="bento-cell">
      <div class="ring-wrap">
        ${ring(s.avg_visibility_score, color, 148, 10)}
        <span class="ring-label" style="font-size:40px;color:${color}">${s.avg_visibility_score ?? '—'}</span>
      </div>
      <p class="hero-title">${platformLabel(s.platform)}</p>
      <p class="hero-caption">Strongest AI channel · avg position ${s.avg_brand_position ?? '—'} · ${s.queries_tested} queries tested</p>
    </div>`;
}

function secondaryCell(s) {
  const color = platformColor(s.platform);
  return `
    <div class="bento-cell">
      <div class="ring-wrap">
        ${ring(s.avg_visibility_score, color, 76, 6)}
        <span class="ring-label" style="font-size:17px;color:${color}">${s.avg_visibility_score ?? '—'}</span>
      </div>
      <p class="cell-title">${platformLabel(s.platform)}</p>
      <p class="cell-caption">avg position ${s.avg_brand_position ?? '—'} · ${s.queries_tested} queries</p>
    </div>`;
}

async function loadClient(slug) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="empty">Loading…</div>';

  const [summaryRes, queriesRes, mentionsRes] = await Promise.all([
    fetch(`/api/summary?client=${encodeURIComponent(slug)}`),
    fetch(`/api/queries?client=${encodeURIComponent(slug)}`),
    fetch(`/api/mentions?client=${encodeURIComponent(slug)}`),
  ]);
  const summary = await summaryRes.json();
  const queries = await queriesRes.json();
  const mentions = await mentionsRes.json();

  if (!summary.length) {
    content.innerHTML = '<div class="empty">No data yet for this client.</div>';
    return;
  }

  const ranked = [...summary].sort((a, b) => (b.avg_visibility_score ?? 0) - (a.avg_visibility_score ?? 0));
  const [best, ...rest] = ranked;

  const mentionsHtml = mentions.length
    ? `<div class="mentions-wrap">${mentions.map(m => `
        <div class="mention-chip">
          <span class="chip-avatar" style="background:${hashColor(m.name)}22;color:${hashColor(m.name)}">${escapeHtml(initials(m.name))}</span>
          <span class="chip-name">${escapeHtml(m.name)}</span>
          <span class="chip-count">${m.count}×</span>
        </div>`).join('')}</div>`
    : `<p class="mentions-empty">No other brands showed up alongside this client yet.</p>`;

  const rows = queries.map((q, i) => `
    <tr class="row" onclick="toggleDetail(${i})">
      <td><span class="pill" style="background:${platformColor(q.platform)}22;color:${platformColor(q.platform)}">${platformLabel(q.platform)}</span></td>
      <td>${q.check_date}</td>
      <td class="query-cell">${escapeHtml(q.query_text)}</td>
      <td>${q.visibility_score ?? '—'}</td>
      <td>${q.brand_position ?? '—'} / ${q.total_brands ?? '—'}</td>
    </tr>
    <tr class="detail" id="detail-${i}">
      <td colspan="5">
        ${q.mentions && q.mentions.length ? `<section><h4>Mentioned</h4>${q.mentions.map(m => `<span class="pill mention-pill">${escapeHtml(m)}</span>`).join('')}</section>` : ''}
        ${q.competitor_analysis ? `<section><h4>Competitor analysis</h4>${escapeHtml(q.competitor_analysis)}</section>` : ''}
        ${q.raw_output ? `<section><h4>Raw response</h4>${escapeHtml(q.raw_output)}</section>` : ''}
      </td>
    </tr>
  `).join('');

  content.innerHTML = `
    <div class="bento-row1">
      ${heroCell(best)}
      ${rest.map(secondaryCell).join('')}
    </div>
    <div class="bento-row2">
      <div class="panel-cell">
        <p class="cell-heading">Visibility score by platform</p>
        <div class="chart-box"><canvas id="chart"></canvas></div>
      </div>
      <div class="panel-cell">
        <p class="cell-heading">Most mentioned alongside this client</p>
        ${mentionsHtml}
      </div>
    </div>
    <div class="panel">
      <h2>Queries tested (click a row for the full response)</h2>
      <table>
        <thead><tr><th>Platform</th><th>Date</th><th>Query</th><th>Score</th><th>Position</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: {
      labels: summary.map(s => platformLabel(s.platform)),
      datasets: [{
        data: summary.map(s => s.avg_visibility_score),
        backgroundColor: summary.map(s => platformColor(s.platform)),
        borderRadius: 6,
        maxBarThickness: 48,
      }],
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { min: 0, max: 100, grid: { color: '#212328' }, ticks: { color: '#86868C' } },
        y: { grid: { display: false }, ticks: { color: '#EDEDF0', font: { size: 13 } } },
      },
    },
  });
}

function toggleDetail(i) {
  document.getElementById(`detail-${i}`).classList.toggle('open');
}

// --- Init ---
loadClients();
</script>
</body>
</html>
